<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SchemaTest: CSE categories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tests-container">
    <!-- 🔁 Back to Main Page -->
    <a href="index.html" class="back-to-main">← Back to Home</a>

    <h1>Select a Subject</h1>

    <!-- Main Categories -->
    <div class="tiles-grid" id="main-categories">
      <div class="tile" onclick="showCategory('english')">English</div>
      <div class="tile disabled">Math</div>
      <div class="tile disabled">Other</div>
    </div>

    <!-- English Subcategories -->
    <div class="test-section hidden" id="english-subcategories">
      <h2>English Categories</h2>
      <div class="tiles-grid subcategories">
        <div class="tile subcategory-btn" data-category="eng-vocabulary">Vocabulary</div>
        <div class="tile subcategory-btn" data-category="eng-word-analogy">Word Analogy</div>
        <div class="tile subcategory-btn" data-category="eng-grammar">Grammar</div>
        <div class="tile subcategory-btn" data-category="eng-sequence">Sequence</div>
        <div class="tile subcategory-btn" data-category="eng-logical-fallacies">Logical Fallacies</div>
        <div class="tile subcategory-btn" data-category="eng-assumptions-conclusions">Assumption & Conclusion</div>
      </div>

      <button class="back-btn" onclick="goBack()">← Back</button>
    </div>
  </div>

  <script src="tests.js"></script>
</body>
</html>
