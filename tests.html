<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SchemaTest: CSE categories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/tests.css">
</head>
<body>
  <div class="tests-container">
    <!-- 🔁 Back to Main Page -->
    <a href="index.html" class="back-to-main">← Back to Home</a>

    <h1>Select a Subject</h1>

    <div class="test-section" id="main-categories">
      <button class="category-button" onclick="showCategory('english')">English</button>
      <button class="category-button" disabled>Math</button>
      <button class="category-button" disabled>Other</button>
    </div>

    <!-- English Subcategories -->
    <div class="test-section hidden" id="english-subcategories">
      <h2>English Categories</h2>
      <div class="subcategories">
        <button class="subcategory-btn category-button" data-category="eng-vocabulary">Vocabulary</button>
        <button class="subcategory-btn category-button" data-category="eng-word-analogy">Word Analogy</button>
        <button class="subcategory-btn category-button" data-category="eng-grammar">Grammar</button>
        <button class="subcategory-btn category-button" data-category="eng-sequence">Sequence</button>
        <button class="subcategory-btn category-button" data-category="eng-logical-fallacies">Logical Fallacies</button>
        <button class="subcategory-btn category-button" data-category="eng-assumptions-conclusions">Assumption & Conclusion</button>
      </div>

      <button class="back-btn" onclick="goBack()">← Back</button>
    </div>
  </div>

  <script src="tests.js"></script>
</body>
</html>
