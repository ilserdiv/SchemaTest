<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SchemaTest: CSE quiz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="quiz-container">
    <div class="back-wrapper">
      <a href="tests.html" class="back-to-main">← Back to Categories</a>
    </div>

    <div class="quiz-header">
      <h2 id="quiz-title"></h2>
      <p>This quiz has 10 questions. You will have 10 minutes to complete it.</p>
      <p>💡<i>Identify the connection of the question pair, then pick the choice with the same relationship.</i>💡</p>
    </div>

    <div class="quiz-controls">
      <div class="timer" id="timer">Time Left: 10:00</div>
      <button id="start-btn" type="button">Start Quiz</button>
    </div>

    <div id="quiz-form">
      <div id="questions-wrapper"></div>
    </div>

    <div class="submit-wrapper">
      <button id="submit-btn" class="hidden" type="button">Submit Answers</button>
    </div>
  </div>

  <div id="feedback-box"></div>
  <div id="feedback-overlay"></div>

  <script src="quiz.js"></script>
</body>
</html>
